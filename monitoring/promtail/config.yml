server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-file-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            event: event
            job_public_id: job_public_id
            celery_task_id: celery_task_id
            method_key: method_key
            target: target
      - labels:
          level:
          event:
          job_public_id:
          celery_task_id:
          method_key:
          target:
